# AWS Amplify Hosting (static Vite site)
# In Amplify Console: set "App root" to this folder if the repo root is the monorepo (e.g. style.ai).
# Add VITE_* env vars under Hosting → Environment variables (build-time).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
