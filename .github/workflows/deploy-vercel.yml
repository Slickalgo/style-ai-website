# ─────────────────────────────────────────────────────────────────────────
# Deploy UKTI marketing site to Vercel
# ─────────────────────────────────────────────────────────────────────────
#
# Trigger:
#   - Push to `main` (production deploy → ukti.io after DNS flip)
#   - Manual `workflow_dispatch` to redeploy any branch
#
# Flow:
#   1. Checkout the repo at the pushed SHA
#   2. Install Node 20 + Vercel CLI
#   3. `npm install` (sharp native bindings — see note below)
#   4. `vercel pull` — fetch project settings + env vars from Vercel
#   5. `vercel build --prod` — runs the project's `npm run build`
#      (prebuild image optimization + vite build), wraps output into
#      `.vercel/output/` Vercel-prebuilt format
#   6. `vercel deploy --prebuilt --prod` — ships the prebuilt output to
#      production. No re-build on Vercel side.
#
# Why CLI deploy (and not Vercel's native GitHub integration):
#   - Same install strategy as Amplify migration: `npm install` (NOT
#     `npm ci`) because sharp's native bindings have platform-scoped
#     optional deps that a macOS-generated lockfile doesn't capture.
#   - Build runs in GH Actions where we control the env, then ships the
#     fully-built `.vercel/output/` artifact. Identical-to-dev pipeline.
#   - Cleaner secret surface: GitHub doesn't need a Vercel-side OAuth
#     grant; we use a single Vercel API token instead.
#   - Optional: revert to Vercel native GitHub integration later by
#     deleting this workflow + connecting the repo on Vercel dashboard.
#     Vercel will pick up `vercel.json` + `package.json build` script
#     and handle build itself. (Slightly slower cold builds, but zero
#     workflow maintenance.)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - VERCEL_TOKEN       — Personal access token from
#                          vercel.com/account/tokens (scope: full account
#                          OR project-scoped to ukti-marketing)
#   - VERCEL_ORG_ID      — From `.vercel/project.json` after first
#                          `vercel link` locally (or from Vercel project
#                          settings → General → Team ID)
#   - VERCEL_PROJECT_ID  — Same source — project ID
#
# First-time setup (run once locally, by Founder):
#   ```
#   cd ukti-website
#   npx vercel login
#   npx vercel link        # creates .vercel/project.json with org+project
#   cat .vercel/project.json   # copy orgId + projectId into GH Secrets
#   ```
#   Then add VERCEL_TOKEN from vercel.com/account/tokens to GH Secrets.
#
# Custom domain cutover (DNS-level, separate from this workflow):
#   1. Vercel dashboard → Project → Settings → Domains → add `ukti.io`
#      and `www.ukti.io`. Vercel surfaces the required CNAME / A records.
#   2. Update DNS at registrar (Cloudflare per follow-ups §A-8 plan):
#      - `A @ 76.76.21.21`  (Vercel's anycast)
#      - `CNAME www cname.vercel-dns.com`
#   3. Wait for SSL cert provisioning (~30s after DNS resolves).
#   4. Decommission Amplify app at the SAME time DNS flips, not before
#      (avoid serving stale content during propagation).
#
# Rollback path:
#   - Vercel deployments are immutable + indexed. To revert: Vercel
#     dashboard → Deployments → previous deployment → "Promote to
#     production". One click; ~5 sec.
#   - Or via CLI: `vercel rollback <deployment-url> --token=…`
# ─────────────────────────────────────────────────────────────────────────

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install dependencies
        # `npm install` not `npm ci` — sharp's native bindings have
        # platform-scoped optional deps (@emnapi/core, @emnapi/wasi-threads
        # on linux-x64) that a macOS-generated lockfile doesn't capture.
        # See https://sharp.pixelplumbing.com/install#cross-platform
        run: npm install --no-audit --no-fund

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (prebuild image optimization + vite build)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact to Vercel production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$url" >> "$GITHUB_OUTPUT"
          echo "::notice::Deployed to $url"

      - name: Verify deployment is live
        run: |
          # Vercel returns the deployment URL; smoke-test that it serves 200.
          # Custom-domain (ukti.io) verification is separate — handled at
          # DNS cutover time.
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.deploy_url }}")
          if [ "$status" != "200" ]; then
            echo "::error::Deployment URL returned HTTP $status (expected 200)"
            exit 1
          fi
          echo "::notice::Deploy verified live at HTTP $status"
