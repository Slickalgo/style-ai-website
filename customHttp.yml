# AWS Amplify custom HTTP response headers — applied to every served path.
#
# HOW TO APPLY (zip-upload deploy path):
#   Amplify Console → App settings → Custom headers → paste this YAML.
#   The console stores it and CloudFront applies it on every response.
#   This file is the canonical source of truth; keep it in sync with the console.
#
# PRE-LAUNCH NOTE: remove the noindex meta from all HTML files AND remove the
#   robots.txt Disallow: / on launch day. These headers survive launch — they
#   are security headers, not crawl-control.
#
# CSP connect-src: website is a static marketing site with no Supabase or
#   Sentry calls. Extend this list only if the site grows a server-side
#   data dependency. No GTM / Meta Pixel / GA / Segment — launch brief forbids.

customHeaders:
  - pattern: '**'
    headers:
      - key: Content-Security-Policy
        value: >-
          default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data:;
          font-src 'self' data:;
          connect-src 'self';
          frame-ancestors 'none';
          base-uri 'self';
          form-action 'self';
          object-src 'none';
          upgrade-insecure-requests
      - key: Cross-Origin-Opener-Policy
        value: same-origin
      - key: Cross-Origin-Embedder-Policy
        value: require-corp
      - key: Origin-Agent-Cluster
        value: '?1'
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains; preload'
      - key: X-Content-Type-Options
        value: nosniff
      - key: X-Frame-Options
        value: DENY
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(), interest-cohort=()'
