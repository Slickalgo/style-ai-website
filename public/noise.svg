<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!--
    Warm film-grain overlay for editorial compositions. Rendered via
    feTurbulence so we don't ship a raster texture; 240×240 tile repeats
    cleanly. Reference via background-image in style.css .grain-overlay.
    Opacity + blend mode are applied at the CSS layer so this asset stays
    tone-agnostic.
  -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.05  0 0 0 0 0.04  0 0 0 0 0.03  0 0 0 1 0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>
