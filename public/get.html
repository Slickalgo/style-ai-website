<!doctype html>
<!--
  Smart install redirect — ukti.io/get

  Purpose: one short URL that a user can be handed anywhere (QR code on the
  desktop Beat 6, WhatsApp message, printed card) that routes them to the
  right store automatically.

  Device detection happens client-side via navigator.userAgent + navigator.userAgentData:
    - iOS / iPadOS → redirect to App Store
    - Android → redirect to Play Store
    - Anything else (desktop, bot, unknown) → stays on the page and
      shows both store pills + a helpful "open on your phone" note

  The page itself is tiny (no main.css dep, no Tailwind, no framework) so the
  redirect fires fast and no-JS fallback still works. Store URLs come from
  /config.js so the page stays in sync with the rest of the site when real
  App Store / Play Store URLs replace the placeholders.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Install Ukti</title>
    <meta name="description" content="Open Ukti on your phone." />
    <meta name="robots" content="noindex" />

    <style>
      :root {
        --paper: #f5f1ea;
        --ink: #0d0b0a;
        --stone: #5f5854;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: ui-serif, Georgia, serif;
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem 1.5rem;
      }
      main {
        max-width: 28rem;
      }
      h1 {
        font-weight: 500;
        font-size: 2rem;
        line-height: 1.1;
        margin: 0 0 1rem;
      }
      p {
        color: var(--stone);
        font-size: 1.05rem;
        line-height: 1.5;
        margin: 0 0 2rem;
      }
      .pills {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 48px;
        outline: 2px solid transparent;
        outline-offset: 3px;
        transition: outline-color 150ms ease;
      }
      .pill:hover,
      .pill:focus-visible {
        outline-color: var(--ink);
      }
      .pill img {
        display: block;
        height: 48px;
        width: auto;
      }
      .note {
        font-family: ui-monospace, Menlo, monospace;
        text-transform: uppercase;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        color: var(--stone);
        margin-top: 2rem;
      }
    </style>

    <script src="/config.js"></script>
    <script>
      // Device-sniff + redirect. Fires immediately; fallback UI below shows
      // only when sniff is inconclusive (desktop / bot / private browsing).
      (function () {
        var cfg = window.UKTI_CONFIG || {};
        var ua = (navigator.userAgent || "").toLowerCase();
        var uaData = navigator.userAgentData;

        var isIOS =
          /iphone|ipad|ipod/i.test(ua) ||
          // iPadOS 13+ identifies as Mac; double-check with touch capability
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        var isAndroid = /android/i.test(ua);

        // uaData.mobile is the modern hint; only trust if present
        if (!isIOS && !isAndroid && uaData && uaData.mobile) {
          var brand = (uaData.brands || []).map(function (b) { return (b.brand || "").toLowerCase(); }).join(" ");
          if (brand.indexOf("android") >= 0) isAndroid = true;
        }

        if (isIOS && cfg.appStoreUrl) {
          window.location.replace(cfg.appStoreUrl);
        } else if (isAndroid && cfg.playStoreUrl) {
          window.location.replace(cfg.playStoreUrl);
        }
        // Desktop / unknown: let the fallback UI render below.
      })();
    </script>
  </head>

  <body>
    <main>
      <h1>Open Ukti on your phone.</h1>
      <p>
        This link opens the App Store or Google Play on your phone. On a
        laptop, pick your store below or scan the code you came from.
      </p>

      <div class="pills">
        <a
          class="pill"
          href="https://apps.apple.com/app/ukti/id000000000"
          rel="noopener"
          aria-label="Download on the App Store"
        >
          <img src="/badges/app-store.svg" alt="" width="144" height="48" />
        </a>
        <a
          class="pill"
          href="https://play.google.com/store/apps/details?id=io.ukti.app"
          rel="noopener"
          aria-label="Get it on Google Play"
        >
          <img src="/badges/google-play.svg" alt="" width="162" height="48" />
        </a>
      </div>

      <p class="note">UKTI · ISSUE №01</p>
    </main>
  </body>
</html>
