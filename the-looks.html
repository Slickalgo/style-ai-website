<!doctype html>
<html lang="en" class="bg-paper">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo-mark.svg" />
    <meta name="theme-color" content="#F5F1EA" />
    <title>The looks — Style.ai</title>
    <meta
      name="description"
      content="Ten pulls, one issue. Real Style.ai renders — cold snaps, office days, brunches, evenings. Download on iOS + Android."
    />
    <link rel="canonical" href="https://styledesigner.co.in/the-looks" />

    <!-- Meta-ad lander. Used when the ad creative leads with the "result"
         framing (image-forward, proof of range). noindex so it stays out
         of organic search results. -->
    <meta name="robots" content="noindex,follow" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://styledesigner.co.in/the-looks" />
    <meta property="og:title" content="The looks — Style.ai" />
    <meta
      property="og:description"
      content="Ten pulls. Real renders. One stylist."
    />
    <meta property="og:image" content="https://styledesigner.co.in/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <link
      rel="preload"
      as="font"
      href="/fonts/Fraunces-400-italic.woff2"
      type="font/woff2"
      crossorigin
    />
  </head>

  <body class="bg-paper text-ink antialiased">
    <header class="mx-auto max-w-editorial px-6 pt-10">
      <p class="eyebrow tracking-wider" style="color: rgba(168, 155, 138, 0.85)">
        ISSUE №01 · THE LOOKS
      </p>
      <p
        class="mt-2 font-display text-[22px] tracking-tight"
        aria-label="Style.ai"
      >
        <a href="/" class="hover:opacity-70 transition-opacity">
          Style<span class="opacity-70">.ai</span>
        </a>
      </p>
    </header>

    <main class="mx-auto max-w-editorial px-6 pb-32 pt-20 sm:pt-28">

      <!-- Title spread -->
      <section class="site-sr-section mb-20 sm:mb-28">
        <h1
          class="verdict verdict--hero site-sr-item"
          style="--site-sr-delay: 0ms"
        >
          The looks.
        </h1>
        <p
          class="whisper site-sr-item mt-5 max-w-prose"
          style="--site-sr-delay: 160ms"
        >
          Ten pulls. Different weather, different moods, different people.
          Same stylist.
        </p>
      </section>

      <!-- Looks grid — mobile single column, desktop 3-col with masonry-like
           vertical offsets so the eye traces a diagonal rather than a grid.
           Each figure is self-contained so screen readers announce the
           caption after each image. -->
      <section
        class="site-sr-section grid grid-cols-1 gap-16 sm:grid-cols-2 sm:gap-x-10 sm:gap-y-20 lg:grid-cols-3 lg:gap-x-12"
        aria-label="Ten looks"
      >

        <figure class="site-sr-item" style="--site-sr-delay: 0ms">
          <picture class="block w-full">
            <source srcset="/images/522f0c15a4e6.avif" type="image/avif" />
            <source srcset="/images/522f0c15a4e6.webp" type="image/webp" />
            <img
              src="/images/522f0c15a4e6.png"
              alt="Cold-snap pull: ivory knit, navy trouser, leather mule"
              class="aspect-[2/3] w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </picture>
          <figcaption class="mt-4">
            <p class="eyebrow">MON · 28°F · COLD SNAP</p>
            <p class="font-display italic text-[22px] leading-tight mt-2">
              &ldquo;Bundled, composed.&rdquo;
            </p>
            <p class="pieces mt-1">Ivory knit. Navy trouser. Leather mule.</p>
          </figcaption>
        </figure>

        <figure class="site-sr-item lg:mt-16" style="--site-sr-delay: 100ms">
          <picture class="block w-full">
            <source srcset="/images/89096df6ac08.avif" type="image/avif" />
            <source srcset="/images/89096df6ac08.webp" type="image/webp" />
            <img
              src="/images/89096df6ac08.png"
              alt="Office pull: charcoal blazer, olive trouser, oxford shoe"
              class="aspect-[2/3] w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </picture>
          <figcaption class="mt-4">
            <p class="eyebrow">WED · 54°F · OVERCAST</p>
            <p class="font-display italic text-[22px] leading-tight mt-2">
              &ldquo;Quiet command.&rdquo;
            </p>
            <p class="pieces mt-1">Charcoal blazer. Olive trouser. Oxford shoe.</p>
          </figcaption>
        </figure>

        <figure class="site-sr-item lg:mt-8" style="--site-sr-delay: 200ms">
          <picture class="block w-full">
            <source srcset="/images/a72cfc383f12.avif" type="image/avif" />
            <source srcset="/images/a72cfc383f12.webp" type="image/webp" />
            <img
              src="/images/a72cfc383f12.png"
              alt="Brunch pull: ivory shirt, faded denim, raffia mule"
              class="aspect-[2/3] w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </picture>
          <figcaption class="mt-4">
            <p class="eyebrow">FRI · 72°F · GOLDEN HOUR</p>
            <p class="font-display italic text-[22px] leading-tight mt-2">

          </figcaption>
        </figure>

            <source srcset="/images/cdedd99bf2d5.webp" type="image/webp" />
            <img

            <source srcset="/images/08349e12269a.webp" type="image/webp" />

          <picture class="block w-full">

            <source srcset="/images/4f28726ca1c6.webp" type="image/webp" />
            <img
              src="/images/4f28726ca1c6.png"

              class="aspect-[2/3] w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </picture>
          <figcaption class="mt-4">
            <p class="eyebrow">THU · 42°F · CLEAR</p>

            </p>
            <p class="pieces mt-1">Camel knit. Black denim. Brown loafer.</p>

        </figure>

        <figure class="site-sr-item" style="--site-sr-delay: 600ms">
          <picture class="block w-full">
            <source srcset="/images/63d9bb1e1a74.avif" type="image/avif" />
            <source srcset="/images/63d9bb1e1a74.webp" type="image/webp" />

        <figure class="site-sr-item lg:mt-12" style="--site-sr-delay: 700ms">

          </picture>

          </figcaption>
        </figure>

        <figure class="site-sr-item lg:mt-4" style="--site-sr-delay: 800ms">
          <picture class="block w-full">
            <source srcset="/images/988f70d5c1e6.avif" type="image/avif" />
            <source srcset="/images/988f70d5c1e6.webp" type="image/webp" />
            <img

              alt="A working-day pull, composed and direct"
              class="aspect-[2/3] w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </picture>
          <figcaption class="mt-4">
            <p class="eyebrow">WED · 61°F · CLEAR</p>
            <p class="font-display italic text-[22px] leading-tight mt-2">
              &ldquo;Direct address.&rdquo;
            </p>
            <p class="pieces mt-1">Black crew. Tailored trouser. Leather mule.</p>
          </figcaption>
        </figure>

        <figure class="site-sr-item" style="--site-sr-delay: 900ms">
          <picture class="block w-full">
            <source srcset="/images/a7640dc147b6.avif" type="image/avif" />
            <source srcset="/images/a7640dc147b6.webp" type="image/webp" />
            <img
              src="/images/a7640dc147b6.png"
              alt="A weekend look: cardigan, denim, loafer"
              class="aspect-[2/3] w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </picture>
          <figcaption class="mt-4">
            <p class="eyebrow">SAT · 64°F · SOFT LIGHT</p>
            <p class="font-display italic text-[22px] leading-tight mt-2">
              &ldquo;Not trying.&rdquo;
            </p>
            <p class="pieces mt-1">Cream cardigan. Worn denim. Penny loafer.</p>
          </figcaption>
        </figure>

      </section>

      <!-- The ask -->
      <section class="site-sr-section mt-28 border-t border-stone/30 pt-16 text-center sm:mt-32 sm:pt-20">
        <h2
          class="verdict site-sr-item"
          style="--site-sr-delay: 0ms"
        >
          Your turn.
        </h2>
        <p
          class="whisper site-sr-item mt-5"
          style="--site-sr-delay: 140ms"
        >
          One outfit. Every morning. No ads.
        </p>
        <div
          class="site-sr-item mt-10 flex flex-col items-center justify-center gap-4 sm:flex-row sm:gap-5"
          style="--site-sr-delay: 280ms"
        >
          <a
            href="https://apps.apple.com/"
            class="cta-pill cta-pill--ink"
            data-store-link="ios"
            rel="noopener"
            aria-label="Download Style.ai on the App Store"
          >
            App Store →
          </a>
          <a
            href="https://play.google.com/store/"
            class="cta-pill cta-pill--ink"

            rel="noopener"
            aria-label="Download Style.ai on Google Play"
          >
            Google Play →
          </a>

    </main>

    <footer class="bg-ink py-10">
      <div
        class="mx-auto flex max-w-editorial flex-col items-center justify-between gap-4 px-6 sm:flex-row"

        <p class="eyebrow eyebrow--paper">STYLE.AI · 2026</p>
        <nav aria-label="Footer">
          <ul

            <li><a href="/privacy" class="transition-opacity hover:opacity-100">PRIVACY</a></li>
            <li><a href="/terms" class="transition-opacity hover:opacity-100">TERMS</a></li>
